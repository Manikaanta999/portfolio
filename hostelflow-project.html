<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HostelFlow - Project Showcase</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="project-page-body">
    <section class="project-page">
        <div class="container">
            <a href="index.html#projects" class="back-link"><i class="fas fa-arrow-left"></i> Back to Projects</a>
            <div class="project-page-header">
                <h1>HostelFlow</h1>
                <p>Hostel management web app for room allocation, payment tracking, and monthly reporting.</p>
                <div class="project-page-actions">
                    <a href="https://hostelflow.netlify.app/" target="_blank" rel="noopener noreferrer" class="btn btn-primary">
                        <i class="fas fa-play-circle"></i> Open Live App
                    </a>
                    <a href="https://github.com/Manikaanta999/Hostelflow" target="_blank" rel="noopener noreferrer" class="btn btn-secondary">
                        <i class="fab fa-github"></i> View Code
                    </a>
                </div>
            </div>
            <div class="live-preview-card">
                <div class="preview-title">Live Preview</div>
                <iframe
                    class="live-preview-frame"
                    src="https://hostelflow.netlify.app/"
                    title="HostelFlow Live Demo"
                    loading="lazy">
                </iframe>
                <p class="preview-note">If preview does not load, your browser is blocking embedded content. Use Open Live App above.</p>
            </div>
        </div>
    </section>

</html>
